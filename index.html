<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIME FILMS — Character Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0a0f;--ink2:#1a1a2e;
  --gold:#c9a84c;--gold2:#e8c96b;
  --muted:#8a8580;--text:#f0ebe0;--text2:#b8b0a0;
  --sans:'Space Mono',monospace;--serif:'Cormorant Garamond',serif;
  --card-w:240px;--border:#1e1e35;--border2:#2a2a4a;
}
body{background:var(--ink);color:var(--text);font-family:var(--serif);min-height:100vh;overflow-x:hidden}
.masthead{border-bottom:1px solid var(--border2);padding:1.6rem 2.5rem 1.3rem;display:flex;align-items:flex-end;gap:2rem;flex-wrap:wrap;position:sticky;top:0;background:var(--ink);z-index:100}
.logo-eyebrow{font-family:var(--sans);font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.logo-title{font-family:var(--serif);font-size:2.6rem;font-weight:300;letter-spacing:.04em;line-height:1}
.logo-title em{font-style:italic;color:var(--gold)}
.search-block{flex:1;min-width:220px;display:flex;gap:10px}
.search-input{flex:1;background:transparent;border:none;border-bottom:1px solid #3a3a5e;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 0;outline:none;transition:border-color .2s}
.search-input::placeholder{color:#5a5a7a}
.search-input:focus{border-bottom-color:var(--gold)}
.search-btn{background:var(--gold);border:none;color:var(--ink);font-family:var(--sans);font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:background .2s}
.search-btn:hover{background:var(--gold2)}
.genre-bar{padding:.7rem 2.5rem;border-bottom:1px solid #151525;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.genre-label{font-family:var(--sans);font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-right:4px}
.pill{font-family:var(--sans);font-size:10px;letter-spacing:.08em;padding:4px 12px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;background:transparent}
.pill:hover,.pill.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.stage{padding:2rem 2.5rem}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.section-title{font-family:var(--serif);font-size:1.8rem;font-weight:300;font-style:italic}
.section-count{font-family:var(--sans);font-size:11px;color:var(--muted);letter-spacing:.1em}
.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:1.5rem}
.film-card{background:var(--ink2);border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.film-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.film-card:hover .card-img{transform:scale(1.04)}
.card-img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:#0e0e1e}
.card-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,20,.95) 0%,rgba(10,10,20,.2) 60%,transparent 100%);opacity:.6;pointer-events:none;transition:opacity .25s}
.film-card:hover .card-overlay{opacity:.85}
.card-score{position:absolute;top:10px;right:10px;background:var(--gold);color:var(--ink);font-family:var(--sans);font-size:11px;font-weight:700;padding:3px 8px}
.card-year{position:absolute;top:10px;left:10px;font-family:var(--sans);font-size:10px;color:var(--text2);letter-spacing:.1em}
.card-body{padding:1rem;border-top:1px solid var(--border)}
.card-title{font-family:var(--serif);font-size:1.05rem;line-height:1.3;margin-bottom:4px}
.card-studio{font-family:var(--sans);font-size:9px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.card-synopsis{font-size:.83rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-cta{margin-top:10px;font-family:var(--sans);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.state-msg{text-align:center;padding:4rem 2rem;font-family:var(--serif);font-size:1.3rem;font-style:italic;color:var(--muted)}
.loader{display:flex;justify-content:center;align-items:center;gap:8px;padding:5rem}
.dot{width:6px;height:6px;background:var(--gold);animation:pulse 1s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem 4rem}
.backdrop.open{display:flex}
.panel{background:var(--ink2);border:1px solid var(--border2);width:100%;max-width:920px;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.panel-close{position:sticky;top:1rem;float:right;margin:1rem 1rem 0 0;background:transparent;border:1px solid #3a3a5a;color:var(--text2);font-family:var(--sans);font-size:11px;letter-spacing:.1em;padding:6px 14px;cursor:pointer;transition:all .15s;z-index:10}
.panel-close:hover{border-color:var(--gold);color:var(--gold)}
.detail-hero{display:flex;border-bottom:1px solid var(--border)}
.detail-poster{width:200px;flex-shrink:0;object-fit:cover;display:block}
.detail-info{padding:2rem;flex:1}
.detail-eyebrow{font-family:var(--sans);font-size:10px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.detail-title{font-family:var(--serif);font-size:2.1rem;font-weight:300;line-height:1.2;margin-bottom:4px}
.detail-subtitle{font-style:italic;color:var(--text2);font-size:1.05rem;margin-bottom:1rem}
.detail-meta{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.meta-item{font-family:var(--sans);font-size:11px}
.meta-label{color:var(--muted);display:block;margin-bottom:2px}
.meta-val{color:var(--text)}.meta-val.gold{color:var(--gold)}
.detail-synopsis{font-size:.93rem;line-height:1.8;color:var(--text2)}
.genres-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:1rem}
.genre-tag{font-family:var(--sans);font-size:9px;letter-spacing:.1em;padding:3px 10px;border:1px solid #3a3a5a;color:var(--text2);text-transform:uppercase}
.chars-section{padding:2rem}
.chars-heading{font-family:var(--sans);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;padding-bottom:8px;border-bottom:1px solid var(--border)}
.chars-loading{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:1rem;padding:1rem 0}
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1.2rem}
.char-card{border:1px solid var(--border);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;position:relative}
.char-card:hover{border-color:var(--gold);transform:translateY(-3px)}
.char-card:hover .char-hint{opacity:1}
.char-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#0e0e1e}
.char-hint{position:absolute;left:0;right:0;bottom:42px;background:rgba(201,168,76,.93);color:var(--ink);font-family:var(--sans);font-size:9px;letter-spacing:.15em;text-transform:uppercase;text-align:center;padding:5px;opacity:0;transition:opacity .2s}
.char-body{padding:.55rem .6rem}
.char-name{font-family:var(--serif);font-size:.88rem;line-height:1.3;margin-bottom:2px}
.char-role{font-family:var(--sans);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.char-role.main{color:var(--gold)}
.char-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;display:none;align-items:center;justify-content:center;padding:2rem 1rem}
.char-backdrop.open{display:flex}
.char-modal{background:var(--ink2);border:1px solid var(--border2);width:100%;max-width:580px;position:relative;animation:slideUp .22s ease;overflow:hidden}
.char-modal-bar{height:5px;background:var(--gold)}
.char-modal-inner{display:flex}
.char-modal-img{width:175px;flex-shrink:0;object-fit:cover;display:block;background:#0e0e1e;align-self:stretch;min-height:220px}
.char-modal-no-img{width:175px;flex-shrink:0;background:#0e0e1e;display:flex;align-items:center;justify-content:center;min-height:260px;font-family:var(--serif);font-style:italic;color:var(--muted);font-size:.85rem}
.char-modal-body{padding:1.5rem;flex:1;min-width:0}
.char-badge{display:inline-block;font-family:var(--sans);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;margin-bottom:10px}
.char-badge.is-main{background:var(--gold);color:var(--ink)}
.char-badge.is-sup{border:1px solid #3a3a5a;color:var(--text2)}
.char-modal-name{font-family:var(--serif);font-size:1.6rem;font-weight:300;line-height:1.2;margin-bottom:4px}
.char-modal-native{font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--muted);margin-bottom:1rem}
.char-modal-meta{display:flex;gap:1.2rem;flex-wrap:wrap;padding:.7rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:1rem}
.cm-item{font-family:var(--sans);font-size:10px}
.cm-label{color:var(--muted);display:block;margin-bottom:2px;letter-spacing:.1em;text-transform:uppercase}
.cm-val{color:var(--text)}
.char-modal-desc{font-size:.87rem;line-height:1.8;color:var(--text2);max-height:190px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a2a4a transparent}
.char-modal-close{position:absolute;top:12px;right:12px;background:transparent;border:1px solid #3a3a5a;color:var(--text2);font-family:var(--sans);font-size:10px;letter-spacing:.1em;padding:4px 10px;cursor:pointer;transition:all .15s}
.char-modal-close:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:600px){
  .masthead{padding:1.2rem 1rem 1rem}.stage{padding:1.5rem 1rem}
  .detail-hero{flex-direction:column}.detail-poster{width:100%;aspect-ratio:16/9}
  .logo-title{font-size:1.8rem}:root{--card-w:150px}
  .char-modal-inner{flex-direction:column}.char-modal-img{width:100%;min-height:200px}
}
</style>
</head>
<body>

<header class="masthead">
  <div>
    <div class="logo-eyebrow">Character Atlas</div>
    <h1 class="logo-title">Anime <em>Films</em></h1>
  </div>
  <div class="search-block">
    <input class="search-input" id="searchInput" type="text" placeholder="Search a film title…">
    <button class="search-btn" id="searchBtn">Search</button>
  </div>
</header>

<div class="genre-bar">
  <span class="genre-label">Filter:</span>
  <button class="pill active" data-genre="">All</button>
  <button class="pill" data-genre="Action">Action</button>
  <button class="pill" data-genre="Comedy">Comedy</button>
  <button class="pill" data-genre="Drama">Drama</button>
  <button class="pill" data-genre="Fantasy">Fantasy</button>
  <button class="pill" data-genre="Horror">Horror</button>
  <button class="pill" data-genre="Mystery">Mystery</button>
  <button class="pill" data-genre="Sci-Fi">Sci-Fi</button>
  <button class="pill" data-genre="Slice of Life">Slice of Life</button>
  <button class="pill" data-genre="Romance">Romance</button>
  <button class="pill" data-genre="Thriller">Thriller</button>
</div>

<main class="stage">
  <div class="section-header">
    <h2 class="section-title" id="sectionTitle">Popular Films</h2>
    <span class="section-count" id="sectionCount"></span>
  </div>
  <div id="filmGrid" class="film-grid"></div>
  <div id="stateMsg"></div>
</main>

<div class="backdrop" id="filmBackdrop">
  <div class="panel" id="filmPanel">
    <button class="panel-close" id="filmClose">&#x2715; Close</button>
    <div id="filmContent"></div>
  </div>
</div>

<div class="char-backdrop" id="charBackdrop">
  <div class="char-modal">
    <div class="char-modal-bar"></div>
    <button class="char-modal-close" id="charClose">&#x2715; Close</button>
    <div class="char-modal-inner" id="charInner"></div>
  </div>
</div>

<script>
(function(){
'use strict';

var ANILIST='https://graphql.anilist.co';

function gql(q,v){
  return fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query:q,variables:v||{}})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(j){if(j.errors)throw new Error(j.errors[0].message);return j.data;});
}

function clean(s){
  if(!s)return'';
  return s.replace(/<[^>]+>/g,'').replace(/~![\s\S]*?!~/g,'').trim();
}

var filmGrid=document.getElementById('filmGrid');
var stateMsg=document.getElementById('stateMsg');
var secTitle=document.getElementById('sectionTitle');
var secCount=document.getElementById('sectionCount');
var searchInput=document.getElementById('searchInput');
var filmBackdrop=document.getElementById('filmBackdrop');
var filmContent=document.getElementById('filmContent');
var charBackdrop=document.getElementById('charBackdrop');
var charInner=document.getElementById('charInner');

var currentSearch='',currentGenre='',isLoading=false;

function showLoader(){stateMsg.innerHTML='<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';}
function hideLoader(){stateMsg.innerHTML='';}

var FILM_Q_COMMON='id title{romaji english}coverImage{extraLarge large}description averageScore startDate{year}duration genres studios(isMain:true){nodes{name}}rankings{rank type}';

function makeFilmCard(m){
  var title=m.title.english||m.title.romaji||'Untitled';
  var year=(m.startDate&&m.startDate.year)?m.startDate.year:'';
  var score=m.averageScore?(m.averageScore/10).toFixed(1):'--';
  var studio=(m.studios&&m.studios.nodes&&m.studios.nodes[0])?m.studios.nodes[0].name:'';
  var syn=clean(m.description)||'No synopsis available.';
  var img=(m.coverImage&&(m.coverImage.extraLarge||m.coverImage.large))||'';
  var card=document.createElement('div');
  card.className='film-card';
  card.innerHTML=
    '<div class="card-img-wrap">'+
      (img?'<img class="card-img" src="'+img+'" alt="" loading="lazy">':'<div class="card-img" style="background:#111;min-height:200px;"></div>')+
      '<div class="card-overlay"></div>'+
      '<div class="card-score">'+score+'</div>'+
      (year?'<div class="card-year">'+year+'</div>':'')+
    '</div>'+
    '<div class="card-body">'+
      '<div class="card-title">'+title+'</div>'+
      (studio?'<div class="card-studio">'+studio+'</div>':'')+
      '<div class="card-synopsis">'+syn+'</div>'+
      '<div class="card-cta">View Characters &rarr;</div>'+
    '</div>';
  card.addEventListener('click',function(){openFilm(m);});
  return card;
}

function loadFilms(){
  if(isLoading)return;
  isLoading=true;showLoader();filmGrid.innerHTML='';
  var q,v={};
  if(currentSearch){
    secTitle.textContent='Results for "'+currentSearch+'"';
    q='query($s:String){Page(perPage:24){media(search:$s format:MOVIE type:ANIME isAdult:false){'+FILM_Q_COMMON+'}}}';
    v={s:currentSearch};
  }else if(currentGenre){
    secTitle.textContent=currentGenre+' Films';
    q='query($g:String){Page(perPage:24){media(genre:$g format:MOVIE type:ANIME isAdult:false sort:SCORE_DESC){'+FILM_Q_COMMON+'}}}';
    v={g:currentGenre};
  }else{
    secTitle.textContent='Popular Films';
    q='{Page(perPage:24){media(format:MOVIE type:ANIME isAdult:false sort:POPULARITY_DESC){'+FILM_Q_COMMON+'}}}';
  }
  gql(q,v).then(function(data){
    var list=data.Page.media||[];
    hideLoader();
    secCount.textContent=list.length?list.length+' films':'';
    if(!list.length){stateMsg.innerHTML='<p class="state-msg">No films found.</p>';}
    else{list.forEach(function(m){filmGrid.appendChild(makeFilmCard(m));});}
  }).catch(function(e){
    hideLoader();
    stateMsg.innerHTML='<p class="state-msg">Error: '+e.message+'</p>';
    console.error('AniList load error:',e);
  }).finally(function(){isLoading=false;});
}

function openFilm(m){
  var title=m.title.english||m.title.romaji||'Untitled';
  var alt=(m.title.romaji&&m.title.romaji!==title)?m.title.romaji:'';
  var year=(m.startDate&&m.startDate.year)?m.startDate.year:'--';
  var score=m.averageScore?(m.averageScore/10).toFixed(1)+' / 10':'--';
  var dur=m.duration?m.duration+' min':'--';
  var studio=(m.studios&&m.studios.nodes&&m.studios.nodes[0])?m.studios.nodes[0].name:'Anime Film';
  var syn=clean(m.description)||'No synopsis available.';
  var img=(m.coverImage&&(m.coverImage.extraLarge||m.coverImage.large))||'';
  var rank='';
  if(m.rankings){for(var i=0;i<m.rankings.length;i++){if(m.rankings[i].type==='POPULAR'){rank='#'+m.rankings[i].rank;break;}}}
  var genresHtml=(m.genres||[]).map(function(g){return'<span class="genre-tag">'+g+'</span>';}).join('');

  filmContent.innerHTML=
    '<div class="detail-hero">'+
      (img?'<img class="detail-poster" src="'+img+'" alt="">':'')+
      '<div class="detail-info">'+
        '<div class="detail-eyebrow">'+studio+'</div>'+
        '<h2 class="detail-title">'+title+'</h2>'+
        (alt?'<div class="detail-subtitle">'+alt+'</div>':'')+
        '<div class="detail-meta">'+
          '<div class="meta-item"><span class="meta-label">Year</span><span class="meta-val">'+year+'</span></div>'+
          '<div class="meta-item"><span class="meta-label">Score</span><span class="meta-val gold">'+score+'</span></div>'+
          '<div class="meta-item"><span class="meta-label">Duration</span><span class="meta-val">'+dur+'</span></div>'+
          (rank?'<div class="meta-item"><span class="meta-label">Popularity</span><span class="meta-val">'+rank+'</span></div>':'')+
        '</div>'+
        '<p class="detail-synopsis">'+syn+'</p>'+
        '<div class="genres-row">'+genresHtml+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="chars-section">'+
      '<div class="chars-heading">Characters</div>'+
      '<div class="chars-loading" id="charsLoading">Loading characters...</div>'+
      '<div class="chars-grid" id="charsGrid" style="display:none;"></div>'+
    '</div>';

  filmBackdrop.classList.add('open');
  document.body.style.overflow='hidden';

  var charQ='query($id:Int){Media(id:$id){characters(sort:[ROLE,RELEVANCE]){edges{role node{id name{full native}image{large medium}description gender age}}}}}';
  gql(charQ,{id:m.id}).then(function(data){
    var loadEl=document.getElementById('charsLoading');
    var gridEl=document.getElementById('charsGrid');
    if(!loadEl||!gridEl)return;
    var edges=(data.Media&&data.Media.characters&&data.Media.characters.edges)||[];
    if(!edges.length){loadEl.textContent='No character data available.';return;}
    loadEl.style.display='none';gridEl.style.display='grid';
    edges.forEach(function(edge){gridEl.appendChild(makeCharCard(edge.node,edge.role));});
  }).catch(function(){
    var loadEl=document.getElementById('charsLoading');
    if(loadEl)loadEl.textContent='Could not load characters.';
  });
}

function makeCharCard(ch,role){
  var img=(ch.image&&(ch.image.large||ch.image.medium))||'';
  var roleLabel=role==='MAIN'?'Main':role==='SUPPORTING'?'Supporting':(role||'');
  var isMain=role==='MAIN';
  var card=document.createElement('div');
  card.className='char-card';
  card.innerHTML=
    (img?'<img class="char-img" src="'+img+'" alt="" loading="lazy">':'<div class="char-img" style="background:#0e0e1e;min-height:160px;"></div>')+
    '<div class="char-hint">View Profile</div>'+
    '<div class="char-body">'+
      '<div class="char-name">'+ch.name.full+'</div>'+
      '<div class="char-role'+(isMain?' main':'')+'">'+(roleLabel||'&mdash;')+'</div>'+
    '</div>';
  card.addEventListener('click',function(){openChar(ch,role);});
  return card;
}

function openChar(ch,role){
  var img=(ch.image&&(ch.image.large||ch.image.medium))||'';
  var roleLabel=role==='MAIN'?'Main':role==='SUPPORTING'?'Supporting':(role||'--');
  var isMain=role==='MAIN';
  var native=(ch.name&&ch.name.native)||'';
  var gender=ch.gender||'--';
  var age=ch.age||'--';
  var desc=clean(ch.description)||'No description available for this character.';

  charInner.innerHTML=
    (img?'<img class="char-modal-img" src="'+img+'" alt="">':'<div class="char-modal-no-img">No image</div>')+
    '<div class="char-modal-body">'+
      '<span class="char-badge '+(isMain?'is-main':'is-sup')+'">'+roleLabel+'</span>'+
      '<div class="char-modal-name">'+ch.name.full+'</div>'+
      (native?'<div class="char-modal-native">'+native+'</div>':'')+
      '<div class="char-modal-meta">'+
        '<div class="cm-item"><span class="cm-label">Gender</span><span class="cm-val">'+gender+'</span></div>'+
        '<div class="cm-item"><span class="cm-label">Age</span><span class="cm-val">'+age+'</span></div>'+
      '</div>'+
      '<div class="char-modal-desc">'+desc+'</div>'+
    '</div>';

  charBackdrop.classList.add('open');
}

function closeFilm(){filmBackdrop.classList.remove('open');document.body.style.overflow='';}
function closeChar(){charBackdrop.classList.remove('open');}

document.getElementById('filmClose').addEventListener('click',closeFilm);
filmBackdrop.addEventListener('click',function(e){if(e.target===filmBackdrop)closeFilm();});
document.getElementById('charClose').addEventListener('click',closeChar);
charBackdrop.addEventListener('click',function(e){if(e.target===charBackdrop)closeChar();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeChar();closeFilm();}});

document.getElementById('searchBtn').addEventListener('click',function(){
  currentSearch=searchInput.value.trim();currentGenre='';
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
  document.querySelector('.pill[data-genre=""]').classList.add('active');
  loadFilms();
});
searchInput.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('searchBtn').click();});

document.querySelectorAll('.pill').forEach(function(pill){
  pill.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
    pill.classList.add('active');
    currentGenre=pill.dataset.genre;currentSearch='';searchInput.value='';
    loadFilms();
  });
});

loadFilms();
})();
</script>
</body>
</html>
